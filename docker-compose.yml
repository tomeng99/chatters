services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: chatters
      POSTGRES_USER: chatters
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatters}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatters"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  server:
    image: ghcr.io/tomeng99/chatters:latest
    build: ./server
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=chatters
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatters}
      - POSTGRES_DB=chatters
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 3328m

  client:
    image: ghcr.io/tomeng99/chatters-client:latest
    build:
      context: ./client
      args:
        # Optional: bake in the API URL at build time.
        # Leave unset to let the app auto-detect via window.location.hostname.
        - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped
    mem_limit: 256m

volumes:
  postgres_data:
  uploads_data:
