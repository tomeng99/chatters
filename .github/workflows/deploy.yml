name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  SERVER_IMAGE: ghcr.io/tomeng99/chatters
  CLIENT_IMAGE: ghcr.io/tomeng99/chatters-client

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          build-args: |
            EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            echo '${{ secrets.GHCR_PAT }}' | podman login ghcr.io -u '${{ secrets.GHCR_USER }}' --password-stdin
            podman compose pull
            podman compose down
            podman compose up -d
            podman image prune -f
